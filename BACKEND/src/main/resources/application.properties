# ============================================================
# Smart Campus Operations Hub — Application Configuration
# ============================================================

# Database — H2 File-Based (persistent across restarts)
spring.datasource.url=jdbc:h2:file:./data/campushub;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=9a4f4e35456485645db594dec24e5d5975db22e5da5e1b5d5d59a4f4e35456485645db594dec24e5d5975db22e5da5e1b5d5d5
app.jwt.expirationMs=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# File Storage
app.upload.dir=./uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Server
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.com.campusnex=DEBUG
logging.level.org.springframework.security=WARN

